{% load i18n %}
<details class="simorgh-filter" open>
  <summary>
    <i class="fa-solid fa-filter"></i>
    <span>{{ title }}</span>
  </summary>
  <ul>
    {% for choice in choices %}
      <li{% if choice.selected %} class="selected"{% endif %}>
        <a href="{{ choice.query_string|iriencode }}">{{ choice.display }}</a>
      </li>
    {% endfor %}
  </ul>
</details>
